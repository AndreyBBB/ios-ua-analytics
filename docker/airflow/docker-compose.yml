version: "3.8"
# ─────────────────────────────────────────────────────────────────────────────
# Airflow — add this AFTER ClickHouse is working.
#
# HOW TO START (first time):
#   cd docker/airflow
#   echo "AIRFLOW_UID=$(id -u)" > .env
#   docker compose up airflow-init     ← one-time setup (creates admin user)
#   docker compose up -d               ← start all services
#
# THEN OPEN: http://localhost:8080
# User: airflow  |  Password: airflow
#
# HOW TO ADD YOUR DAGS:
#   Your dags/ folder is mounted automatically. Any .py file in airflow/dags/
#   will appear in the Airflow UI within 30 seconds.
# ─────────────────────────────────────────────────────────────────────────────

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    _PIP_ADDITIONAL_REQUIREMENTS: "dbt-core dbt-clickhouse clickhouse-connect"
  volumes:
    - ../../airflow/dags:/opt/airflow/dags           # your DAG files
    - ../../dbt:/opt/airflow/dbt                     # dbt project
    - ../../ingestion:/opt/airflow/ingestion         # ingestion scripts
    - airflow_logs:/opt/airflow/logs
    - airflow_plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username airflow \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password airflow
    restart: on-failure

volumes:
  postgres_data:
  airflow_logs:
  airflow_plugins:
